openapi: "3.0.0"
info:
  title: Treasurio API Gateway
  version: "1.0.0"

servers:
  - url: http://localhost:9000

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK

  /api/v1/quotes/{symbol}:
    get:
      summary: Anlık fiyat
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
          example: BTCUSDT
      responses:
        "200":
          description: OK

  /api/v1/ohlcv/{symbol}:
    get:
      summary: OHLCV mum verisi
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: interval
          in: query
          schema:
            type: string
          example: 1h
        - name: limit
          in: query
          schema:
            type: integer
          example: 50
      responses:
        "200":
          description: OK

  /api/v1/orderbook/{symbol}:
    get:
      summary: Order book
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
          example: spot
        - name: depth
          in: query
          schema:
            type: integer
          example: 100
      responses:
        "200":
          description: OK

  /api/v1/slippage/{symbol}:
    get:
      summary: Slippage hesaplama
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
          example: spot
        - name: side
          in: query
          schema:
            type: string
          example: buy
        - name: size
          in: query
          schema:
            type: number
          example: 100000
      responses:
        "200":
          description: OK

  /api/v1/rsi/heatmap:
    get:
      summary: RSI heatmap
      parameters:
        - name: exchange
          in: query
          schema:
            type: string
          example: binance
        - name: interval
          in: query
          schema:
            type: string
          example: 1h
      responses:
        "200":
          description: OK

  /api/v1/liquidity/{symbol}:
    get:
      summary: Likidite verisi
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /api/v1/spread/{symbol}:
    get:
      summary: Spread verisi
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /api/v1/funding-rate/{symbol}:
    get:
      summary: Funding rate
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /api/v1/compare/{symbol}:
    get:
      summary: Borsalar arası fiyat karşılaştırması
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
          example: BTCUSDT
      responses:
        "200":
          description: OK

  /api/v1/funding/{symbol}:
    get:
      summary: Futures funding rate (3 borsadan)
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
          example: BTCUSDT
      responses:
        "200":
          description: OK

  /api/v1/auth/register:
    post:
      summary: Kayıt ol
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: JWT token döner

  /api/v1/auth/login:
    post:
      summary: Giriş yap (JWT alır)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: JWT token döner

  /api/v1/alerts:
    get:
      summary: Alert listesi (JWT gerekli)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
    post:
      summary: Alert oluştur (JWT gerekli)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                symbol:
                  type: string
                condition:
                  type: string
                  enum: [above, below]
                target:
                  type: number
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/alerts/delete/{id}:
    delete:
      summary: Alert sil (JWT gerekli)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/apikeys:
    post:
      summary: API key kaydet (JWT gerekli)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                exchange:
                  type: string
                apiKey:
                  type: string
                secretKey:
                  type: string
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/apikeys/list/{userId}:
    get:
      summary: API key listesi (JWT gerekli)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/apikeys/delete/{userId}/{exchange}:
    delete:
      summary: API key sil (JWT gerekli)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: exchange
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/portfolio/value:
    get:
      summary: Portföy değeri (JWT gerekli)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/portfolio/pnl:
    get:
      summary: Portföy PnL (JWT gerekli)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/pnl/{userId}:
    get:
      summary: Gerçekleşmiş PnL (JWT gerekli)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/orders:
    get:
      summary: Emirler (JWT gerekli)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/dca/calculate:
    post:
      summary: DCA hesapla (JWT gerekli)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                symbol:
                  type: string
                trades:
                  type: array
                  items:
                    type: object
                    properties:
                      price:
                        type: number
                      quantity:
                        type: number
                simulate_prices:
                  type: array
                  items:
                    type: number
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/risk/calculate:
    post:
      summary: Risk hesapla (JWT gerekli)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account_size:
                  type: number
                risk_percent:
                  type: number
                entry:
                  type: number
                stop_loss:
                  type: number
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/position/cost:
    post:
      summary: Pozisyon maliyet hesapla (JWT gerekli)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                symbol:
                  type: string
                entry_price:
                  type: number
                quantity:
                  type: number
                side:
                  type: string
                  enum: [buy, sell]
                exchange:
                  type: string
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/users/preferences:
    get:
      summary: Kullanıcı tercihleri (JWT gerekli)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/users/preferences/update:
    put:
      summary: Kullanıcı tercihlerini güncelle (JWT gerekli)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                preferred_exchanges:
                  type: array
                  items:
                    type: string
                notifications_enabled:
                  type: boolean
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/efficiency/{symbol}:
    get:
      summary: Piyasa verimliliği (market-data)
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
          example: BTCUSDT
      responses:
        "200":
          description: OK

  /api/v1/apikeys/{userId}/{exchange}:
    get:
      summary: Borsaya ait API key getir (JWT gerekli)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: exchange
          in: path
          required: true
          schema:
            type: string
          example: binance
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/pnl/chart/{userId}:
    get:
      summary: PnL grafik verisi (JWT gerekli)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /positions/{userId}:
    get:
      summary: Kullanıcının pozisyonları - spot + futures (JWT gerekli)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/trades/{userId}:
    get:
      summary: Trade geçmişi (JWT gerekli)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/performance:
    get:
      summary: Kullanıcı performans istatistikleri (JWT gerekli)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Win rate, PnL, best/worst trade
        "401":
          description: Unauthorized

  /api/v1/staking:
    get:
      summary: Stake pozisyonları - Binance, OKX, Bybit (JWT gerekli)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/ws:
    get:
      summary: WebSocket — alert bildirimleri (JWT gerekli)
      description: |
        WebSocket bağlantısı. Alert tetiklenince anlık push gelir.
        Bağlantı: ws://localhost:9000/api/v1/ws
        Header: Authorization: Bearer <token>
      security:
        - bearerAuth: []
      responses:
        "101":
          description: Switching Protocols
        "401":
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
