openapi: "3.0.0"
info:
  title: Treasurio API Gateway
  version: "1.0.0"

servers:
  - url: http://localhost:9000

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK

  /api/v1/quotes/{symbol}:
    get:
      summary: Anlık fiyat
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
          example: BTCUSDT
      responses:
        "200":
          description: OK

  /api/v1/ohlcv/{symbol}:
    get:
      summary: OHLCV mum verisi
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: interval
          in: query
          schema:
            type: string
          example: 1h
        - name: limit
          in: query
          schema:
            type: integer
          example: 50
      responses:
        "200":
          description: OK

  /api/v1/orderbook/{symbol}:
    get:
      summary: Order book
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
          example: spot
        - name: depth
          in: query
          schema:
            type: integer
          example: 100
      responses:
        "200":
          description: OK

  /api/v1/slippage/{symbol}:
    get:
      summary: Slippage hesaplama
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
          example: spot
        - name: side
          in: query
          schema:
            type: string
          example: buy
        - name: size
          in: query
          schema:
            type: number
          example: 100000
      responses:
        "200":
          description: OK

  /api/v1/rsi/heatmap:
    get:
      summary: RSI heatmap
      parameters:
        - name: exchange
          in: query
          schema:
            type: string
          example: binance
        - name: interval
          in: query
          schema:
            type: string
          example: 1h
      responses:
        "200":
          description: OK

  /api/v1/liquidity/{symbol}:
    get:
      summary: Likidite verisi
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /api/v1/spread/{symbol}:
    get:
      summary: Spread verisi
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /api/v1/funding-rate/{symbol}:
    get:
      summary: Funding rate
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /api/v1/auth/login:
    post:
      summary: Giriş yap (JWT alır)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: JWT token döner

  /api/v1/orders:
    get:
      summary: Emirler (JWT gerekli)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/portfolio/{id}:
    get:
      summary: Portfolio (JWT gerekli)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
